<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de visita</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230066A1'/%3E%3Ctext x='16' y='22' font-family='Rubik%2C sans-serif' font-size='16' font-weight='500' text-anchor='middle' fill='white'%3EN%3C/text%3E%3Ccircle cx='26' cy='6' r='5' fill='%23FFA100'/%3E%3C/svg%3E">  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; 
            script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com;
            font-src fonts.gstatic.com;
            style-src 'self' 'unsafe-inline' fonts.googleapis.com;
            connect-src 'self'"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="card" id="card">
    <div class="blob1"></div>
    <div class="blob2"></div>

    <div class="card-header">
      <div class="avatar" id="avatar">
        <svg class="avatar-placeholder" viewBox="0 0 24 24" stroke-width="1.3">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div>
        <div class="card-name" id="cn-name"></div>
        <div class="card-job"  id="cn-job"></div>
        <div class="card-company" id="cn-company"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="contacts" id="contacts"></div>

    <div class="card-footer">
      <div class="qr-wrap">
        <div id="qr"></div>
      </div>
      <div class="footer-actions">
        <div class="footer-label">Guardar contacto</div>
        <button id="download-android" class="dl-btn btn-android">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 15V3m0 12-4-4m4 4 4-4"/>
            <path d="M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17"/>
          </svg>
          Android / General
        </button>
        <button id="download-ios" class="dl-btn btn-ios">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06z"/>
            <path d="M10 2c0 2.5.5 4 3 4"/>
          </svg>
          iPhone / iOS
        </button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
